<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초대장</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black; /* 혹시 대비용 */
            overflow: hidden; /* 스크롤 방지 */
        }

        .wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;  
            /* contain = 화면 안에서 이미지 전체 표시 (잘림 없음) */
            background-color: black; 
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="2026MobileInvitations.png" alt="초대장">
    </div>
</body>
</html>
