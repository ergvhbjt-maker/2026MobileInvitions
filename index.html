<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>초대장</title>
  <style>
    /* 모든 여백/컨테이너 패딩 제거 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: auto; /* 모바일 가로 스크롤 허용 */
    }
    /* Primer 기본 컨테이너 여백 제거 */
    .container-lg,
    .container-xl,
    .container-md,
    .container {
      padding: 0 !important;
      margin: 0 !important;
      max-width: 100% !important;
    }
    /* 이미지 전체 화면 꽉 채움 */
    img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <img src="2026MobileInvitations.png" alt="초대장">
</body>
</html>
